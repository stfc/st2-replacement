<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackStorm Action Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .table-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        .status-badge { font-size: 0.85rem; padding: 0.5em 0.75em; }
        thead { background-color: #e9ecef; }
        .action-link { font-weight: 500; text-decoration: none; }
        .action-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-12 table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Project Configuration Overview</h2>
                <span class="badge bg-secondary">{{ entries|length }} Actions Loaded</span>
            </div>

            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th scope="col" class="w-50">Description</th>
                        <th scope="col">Status</th>
                        <th scope="col" class="text-end">Link</th>
                    </tr>
                </thead>
                <tbody>
                    {% for entry in entries %}
                    <tr>
                        <td class="text-dark">{{ entry.description }}</td>
                        <td>
                            {% if entry.enabled %}
                                <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle status-badge">Enabled</span>
                            {% else %}
                                <span class="badge rounded-pill bg-danger-subtle text-danger border border-danger-subtle status-badge">Disabled</span>
                            {% endif %}
                        </td>
                        <td class="text-end">
                            {# Link points to the new /form/<name> route #}
                            <a href="/form/{{ entry.name }}" class="btn btn-sm btn-outline-primary px-3">
                                Configure Action
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>

<VirtualHost *:443>
    ServerName host-172-16-105-178.nubes.matrix.net

    SSLEngine on
    # Default RHEL/Rocky paths for self-signed or CA certs
    SSLCertificateFile /etc/pki/tls/certs/localhost.crt
    SSLCertificateKeyFile /etc/pki/tls/private/localhost.key

    # OIDC Provider Settings
    OIDCProviderMetadataURL https://iris-iam.matrix.net/.well-known/openid-configuration
    OIDCScope "openid profile"
    OIDCClientID 7ee731cb-64fa-46f7-bef4-4c7d3f3402b7
    OIDCClientSecret S5DFvLonxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxTbRvI6ZyDwwikL-e3aA
    OIDCRedirectURI https://host-172-16-105-178.nubes.matrix.net/callback
    OIDCCryptoPassphrase asdfasdfasdfasdfasdfasdf
    # Mapping Claims to WSGI Environment
    OIDCPassIDTokenAs claims
    OIDCClaimPrefix OIDC_CLAIM_

    # WSGI Configuration
    WSGIDaemonProcess flask_app user=apache group=apache threads=5
    WSGIScriptAlias / /var/www/flask_app/flask_app.wsgi

    <Directory /var/www/flask_app>
        WSGIProcessGroup flask_app
        WSGIApplicationGroup %{GLOBAL}

	# Enforce Authentication for the entire application
        AuthType openid-connect
        Require valid-user
    </Directory>

    ErrorLog /var/log/httpd/flask_app_error.log
    CustomLog /var/log/httpd/flask_app_access.log combined
</VirtualHost>
